# yaml-language-server: $schema=../schemas/network-whitelist.schema.json
#
# Default network egress whitelist for secure dev environment
# Allows only essential endpoints for AI coding tools
#
# See docs/constraints.yaml C-002, C-017, C-018, C-019

schema_version: "1.0.0"

egress_allowed:
  - domain: github.com
    ports: [22, 443]
    description: GitHub - git clone/push via SSH and HTTPS

  - domain: gitlab.com
    ports: [22, 443]
    description: GitLab - git clone/push via SSH and HTTPS

  - domain: api.openai.com
    ports: [443]
    description: OpenAI API - LLM provider for coding assistance

  - domain: api.opencode.ai
    ports: [443]
    description: OpenCode API - alternative LLM provider

  - domain: pypi.org
    ports: [443]
    description: PyPI - Python package registry

  - domain: files.pythonhosted.org
    ports: [443]
    description: Python Package Index - package downloads

  - domain: registry.npmjs.org
    ports: [443]
    description: npm registry - Node.js packages

  - domain: crates.io
    ports: [443]
    description: crates.io - Rust package registry

  - domain: static.crates.io
    ports: [443]
    description: crates.io static assets - Rust package downloads

dns_servers:
  - 8.8.8.8
  - 1.1.1.1

metadata:
  last_updated: "2026-03-25"
  version: "1.0.0"