#cloud-config
# Security cloud-init configuration for secure dev environment
# Configures iptables, AppArmor, OpenCode CLI, and git setup
#
# See docs/features/dev-env-setup/spec.yaml US-002, US-003, US-004, US-005, US-007
# See docs/constraints.yaml C-002, C-004, C-006, C-007, C-009, C-011-C-016, C-017-C-019
#
# This file is merged with base.yaml by launch.sh

# === AppArmor Profile ===
# Load the workspace isolation profile (C-009, DEV-018, DEV-019, DEV-020)
write_files:
  - path: /etc/apparmor.d/opencode-workspace
    owner: root:root
    permissions: '0644'
    content: |
      #include <tunables/global>

      profile opencode-workspace /home/opencode/.{,*/}bin/opencode flags=(attach_disconnected) {
        capability dac_override,
        capability dac_read_search,

        /usr/** r,
        /bin/** r,
        /lib/** r,
        /lib64/** r,
        /etc/** r,

        /home/opencode/workspace/** rw,
        /home/opencode/workspace/ rw,

        /home/opencode/.gitconfig rw,
        /home/opencode/.ssh/known_hosts rw,
        /home/opencode/.ssh/ r,
        /home/opencode/.config/opencode/ r,
        /home/opencode/.config/opencode/** r,

        /tmp/opencode-** rw,
        /tmp/** r,

        network inet tcp,
        network inet udp,
        network inet6 tcp,
        network inet6 udp,

        /home/opencode/.cache/pip/ rw,
        /home/opencode/.cache/pip/** rw,
        /home/opencode/.npm/ rw,
        /home/opencode/.npm/** rw,

        deny /home/opencode/.config/opencode/** w,
        deny /home/opencode/.ssh/id_* w,
        deny /root/** rw,
        deny /etc/ssh/** w,
        deny /**.ssh/** w,

        /var/lib/apt/lists/** r,
        /var/cache/apt/** r,

        /usr/bin/git PUx,
        /usr/bin/python* PUx,
        /usr/bin/node PUx,
        /usr/bin/npm PUx,

        /var/log/** w,
      }

# === iptables Rules ===
# Configure network egress whitelist (C-002, C-017, C-018, C-019, DEV-012-DEV-017)
# The actual rules are generated by launch.sh from network-whitelist.yaml
# This provides the base iptables setup script

runcmd:
  # Enable AppArmor (DEV-020)
  - systemctl enable apparmor
  - systemctl start apparmor
  - apparmor_parser -r /etc/apparmor.d/opencode-workspace
  - echo "AppArmor profile loaded"

  # Configure iptables for network isolation (DEV-012-DEV-017)
  # Default deny all outbound traffic (C-002)
  - iptables -P OUTPUT DROP
  - iptables -P INPUT DROP
  - iptables -P FORWARD DROP

  # Allow established connections and loopback
  - iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
  - iptables -A INPUT -i lo -j ACCEPT
  - iptables -A OUTPUT -o lo -j ACCEPT

  # DNS to trusted resolvers only (C-017, DEV-012)
  - iptables -A OUTPUT -p udp --dport 53 -d 8.8.8.8 -j ACCEPT
  - iptables -A OUTPUT -p udp --dport 53 -d 1.1.1.1 -j ACCEPT
  - iptables -A OUTPUT -p tcp --dport 53 -d 8.8.8.8 -j ACCEPT
  - iptables -A OUTPUT -p tcp --dport 53 -d 1.1.1.1 -j ACCEPT

  # Allow outbound to whitelisted domains (C-019, DEV-013-DEV-015)
  # These rules are generated dynamically by launch.sh from network-whitelist.yaml
  # Default rules for common endpoints:
  # GitHub/GitLab (DEV-013)
  - iptables -A OUTPUT -p tcp --dport 22 -j ACCEPT
  - iptables -A OUTPUT -p tcp --dport 443 -j ACCEPT

  # Log dropped packets for debugging
  - iptables -A OUTPUT -j LOG --log-prefix "IPTABLES_DROP: " --log-level 4
  - iptables -A INPUT -j LOG --log-prefix "IPTABLES_DROP: " --log-level 4

  # Save iptables rules
  - iptables-save > /etc/iptables/rules.v4

  # Disable SSH access (C-004, DEV-004)
  - systemctl stop sshd || true
  - systemctl disable sshd || true

  # Clone repository if --repo was provided (DEV-009)
  # This is done by launch.sh but placeholder for cloud-init
  - echo "Repository cloning handled by launch.sh"

  # Verify OpenCode installation (DEV-027)
  - echo "OpenCode CLI installation and verification handled by launch.sh"

  # Lock down OpenCode config directory after secrets injection (DEV-019)
  - chattr +i /home/opencode/.config/opencode 2>/dev/null || true

  # Final security check
  - echo "Security cloud-init configuration complete"
  - apparmor_status

# === Packages for Network Security ===
# Additional packages for iptables persistence
packages: []