#cloud-config
# Security cloud-init configuration for secure dev environment
# Configures network restrictions, SSH disablement, and post-boot hardening
#
# See docs/features/dev-env-setup/spec.yaml US-002, US-003, US-004, US-005
# See docs/constraints.yaml C-002-C-005, C-008, C-010-C-019
#
# This file is merged with base.yaml by launch.sh

runcmd:
  # Configure iptables for network isolation (DEV-012-DEV-017)
  - iptables -P OUTPUT DROP
  - iptables -P INPUT DROP
  - iptables -P FORWARD DROP
  - iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
  - iptables -A INPUT -i lo -j ACCEPT
  - iptables -A OUTPUT -o lo -j ACCEPT

  # DNS to trusted resolvers only
  - iptables -A OUTPUT -p udp --dport 53 -d 8.8.8.8 -j ACCEPT
  - iptables -A OUTPUT -p udp --dport 53 -d 1.1.1.1 -j ACCEPT
  - iptables -A OUTPUT -p tcp --dport 53 -d 8.8.8.8 -j ACCEPT
  - iptables -A OUTPUT -p tcp --dport 53 -d 1.1.1.1 -j ACCEPT

  # Allow outbound traffic to approved services
  - iptables -A OUTPUT -p tcp --dport 22 -j ACCEPT
  - iptables -A OUTPUT -p tcp --dport 443 -j ACCEPT

  # Log dropped packets for debugging
  - iptables -A OUTPUT -j LOG --log-prefix "IPTABLES_DROP: " --log-level 4
  - iptables -A INPUT -j LOG --log-prefix "IPTABLES_DROP: " --log-level 4
  - iptables-save > /etc/iptables/rules.v4

  # Disable SSH access
  - systemctl stop sshd || true
  - systemctl disable sshd || true

  # Lock down OpenCode config directory after secrets injection
  - chattr +i /home/opencode/.config/opencode 2>/dev/null || true

  - echo "Security cloud-init configuration complete"

packages: []
