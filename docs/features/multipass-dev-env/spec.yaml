# yaml-language-server: $schema=../../../needs-features/schemas/feature-spec.schema.json
# Feature specification: multipass-dev-env

schema_version: "1.0.0"
feature: multipass-dev-env
prefix: MDEV
version: "1.0.0"
last_updated: "2026-03-25"

stories:
  - id: US-001
    title: Launch Development Environment
    narrative:
      as_a: developer
      i_want: to launch a preconfigured development VM with a single command
      so_that: I can quickly start coding without manual setup
    requirements:
      - id: MDEV-001
        text: >-
          When the user runs the launch script with a valid config file,
          the system shall create a Multipass VM with the specified CPU,
          memory, disk, and Ubuntu image.
        ears_type: event-driven
        verification: >-
          Run launch script. Verify VM is created with correct specs
          via `multipass list` and `multipass info opencode-dev`.

      - id: MDEV-002
        text: >-
          The system shall install opencode within the VM during provisioning.
        ears_type: ubiquitous
        verification: >-
          Shell into VM and run `opencode --version`. Confirm it is installed.

      - id: MDEV-003
        text: >-
          When the user provides OPENAI_API_KEY on the host, the system shall
          inject it into the VM at runtime without storing it in the VM image.
        ears_type: event-driven
        verification: >-
          Export OPENAI_API_KEY on host, run launch. Inside VM, verify the
          key is available via `echo $OPENAI_API_KEY` but NOT persisted
          anywhere on disk in the VM.

      - id: MDEV-004
        text: >-
          The system shall clone all git repositories specified in the config
          file into /workspace within the VM.
        ears_type: ubiquitous
        verification: >-
          Check that each repo URL in config.yaml exists as a directory
          inside /workspace in the VM.

  - id: US-002
    title: Secure Network Configuration
    narrative:
      as_a: developer using an AI coding agent
      i_want: the VM to have network security controls that prevent data exfiltration
      so_that: I can safely use agentic AI tools without exposing secrets
    requirements:
      - id: MDEV-005
        text: >-
          The system shall configure UFW (Uncomplicated Firewall) inside the VM
          to deny all incoming network connections by default.
        ears_type: ubiquitous
        verification: >-
          Inside VM, run `sudo ufw status verbose`. Confirm it shows
          "Status: active" and "Default: deny incoming".

      - id: MDEV-006
        text: >-
          The system shall configure UFW to allow only HTTP and HTTPS outgoing
          connections from the VM.
        ears_type: ubiquitous
        verification: >-
          Inside VM, run `sudo ufw status verbose`. Confirm only
          "80/tcp" and "443/tcp" are allowed for outgoing.

      - id: MDEV-007
        text: >-
          The system shall block all other outgoing network connections
          not required for AI tool operation.
        ears_type: ubiquitous
        verification: >-
          Attempt to make an outgoing connection on a non-HTTP/HTTPS port
          from inside VM. Confirm the connection is blocked.

  - id: US-003
    title: Workspace Isolation
    narrative:
      as_a: developer
      i_want: the agent to only have access to the cloned workspace
      so_that: I can contain any malicious code execution to the workspace
    requirements:
      - id: MDEV-008
        text: >-
          The system shall ensure the agent can only read and write files
          within /workspace and its subdirectories.
        ears_type: ubiquitous
        verification: >-
          From inside VM, attempt to read/write files outside /workspace
          (e.g., /etc/passwd, /home/dev/.bashrc). Confirm access is denied
          or directories do not exist.

      - id: MDEV-009
        text: >-
          The system shall not mount any host directories into the VM,
          ensuring complete filesystem isolation.
        ears_type: ubiquitous
        verification: >-
          Run `multipass info opencode-dev` and check Mounts section.
          Confirm no host directories are mounted.

  - id: US-004
    title: Interactive Shell Access
    narrative:
      as_a: developer
      i_want: to connect to the VM via an interactive shell
      so_that: I can interact with opencode and the development environment
    requirements:
      - id: MDEV-010
        text: >-
          The shell script shall connect the user to the VM's shell
          via `multipass shell opencode-dev`.
        ears_type: ubiquitous
        verification: >-
          Run `./shell.sh`. Confirm terminal is connected to the VM.

      - id: MDEV-011
        text: >-
          If the user runs the shell script while the VM is not running,
          then the system shall display an error message and suggest
          running the launch script.
        ears_type: unwanted-behavior
        verification: >-
          Stop the VM with `multipass stop opencode-dev`, run `./shell.sh`.
          Confirm user receives helpful error message.

  - id: US-005
    title: Lifecycle Management
    narrative:
      as_a: developer
      i_want: to save and restore VM snapshots
      so_that: I can return to a known-good state after experimenting
    requirements:
      - id: MDEV-012
        text: >-
          When the user runs the snapshot script, the system shall create
          a dated snapshot of the VM state that can be restored later.
        ears_type: event-driven
        verification: >-
          Run `./snapshot.sh`. Verify snapshot exists via
          `multipass info opencode-dev` showing snapshot count.

      - id: MDEV-013
        text: >-
          When the user runs the destroy script, the system shall stop,
          delete the VM, and purge all associated data.
        ears_type: event-driven
        verification: >-
          Run `./destroy.sh`. Verify VM is completely removed via
          `multipass list` showing no opencode-dev instance.

      - id: MDEV-014
        text: >-
          When the user runs the clone-repo script with a URL and path,
          the system shall clone the specified git repository into the
          specified path within /workspace in the running VM.
        ears_type: event-driven
        verification: >-
          Run `./clone-repo.sh https://github.com/example/repo.git /workspace/repo3`.
          Inside VM, verify `/workspace/repo3` exists and is a valid git clone.

  - id: US-006
    title: OpenCode Configuration
    narrative:
      as_a: developer
      i_want: opencode to be preconfigured to use my API provider
      so_that: I can start coding immediately without setup
    requirements:
      - id: MDEV-015
        text: >-
          The system shall create an opencode config file at
          ~/.config/opencode/opencode.json that references the API key
          via environment variable substitution.
        ears_type: ubiquitous
        verification: >-
          Inside VM, check ~/.config/opencode/opencode.json exists and
          contains "{env:OPENAI_API_KEY}" or equivalent env var reference.

      - id: MDEV-016
        text: >-
          The system shall configure opencode with sensible security defaults
          including permission prompts for bash and edit operations.
        ears_type: ubiquitous
        verification: >-
          Check opencode.json contains permission settings for bash and edit.
