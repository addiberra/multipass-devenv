# yaml-language-server: $schema=../../../.agents/skills/needs-features/schemas/feature-spec.schema.json

schema_version: "1.0.0"
feature: dev-env-setup
prefix: DEV
version: "4.1.0"
last_updated: "2026-04-01"

constraint_notes:
  - constraint: "The system SHALL NOT mount host directories into the VM."
    category: Security
    note: >-
      C-001 forbids host directory mounts. The MVP uses only checked-in inputs
      passed to Multipass during launch.

  - constraint: "The system SHALL restrict network egress to essential ports via UFW."
    category: Security
    note: >-
      C-002 remains enforced by the checked-in cloud-init file rather than by
      dynamic CLI-generated firewall rules.

  - constraint: "The system SHALL permit only the SSH access required for Multipass-managed guest operations."
    category: Security
    note: >-
      C-004 is satisfied by the checked-in cloud-init firewall rules that keep
      inbound traffic denied by default while allowing the SSH path Multipass
      needs for guest operations.

  - constraint: "The system SHALL run OpenCode as a non-root user."
    category: Security
    note: >-
      C-005 is satisfied by the guest setup baked into the checked-in cloud-init
      file.

stories:
  - id: US-001
    title: Create Environment from Project Config
    narrative:
      as_a: developer
      i_want: to create a Multipass VM from a checked-in machine config file
      so_that: I can start the environment with one repeatable command
    requirements:
      - id: DEV-001
        text: >-
          When the developer runs the create command in a directory containing
          `devvm.yaml`, the system shall create a Multipass VM using the machine
          values defined in that file.
        ears_type: event-driven
        verification: >-
          Place a valid `devvm.yaml` in a test directory and run the create
          command there. Confirm that a new VM is created and that its name,
          CPU count, memory, disk, and Ubuntu release match the configuration.

      - id: DEV-002
        text: >-
          If `devvm.yaml` is missing or unreadable, then the system shall
          display an error and abort before creating a VM.
        ears_type: unwanted-behavior
        verification: >-
          Run the create command in a directory without `devvm.yaml`, then
          repeat with unreadable permissions on the file. Confirm the command
          fails with an error and `multipass list` shows no new VM.

      - id: DEV-003
        text: >-
          If `devvm.yaml` does not conform to the supported schema, then the
          system shall identify the invalid field and abort before creating a VM.
        ears_type: unwanted-behavior
        verification: >-
          Set an invalid value such as `instance.cpus: 0` in `devvm.yaml` and
          run the create command. Confirm the command fails with a validation
          error that identifies the invalid field and no VM is created.

      - id: DEV-004
        text: >-
          If `instance.name` is omitted from `devvm.yaml`, then the system shall
          generate a valid Multipass instance name derived from the current
          working directory name.
        ears_type: unwanted-behavior
        verification: >-
          Remove `instance.name` from a valid config and run the create command.
          Confirm the VM is created successfully and the reported VM name is a
          valid Multipass instance name derived from the working directory name.

  - id: US-002
    title: Launch with a Checked-In Cloud-Init File
    narrative:
      as_a: developer
      i_want: the create command to use a checked-in cloud-init file
      so_that: the first MVP stays simple and easy to inspect
    requirements:
      - id: DEV-005
        text: >-
          When the developer runs the create command, the system shall launch a
          fresh Ubuntu VM using `instance.ubuntu_release` and the cloud-init
          file referenced by `devvm.yaml`.
        ears_type: event-driven
        verification: >-
          Run the create command with a valid config and confirm the VM is
          launched from the configured Ubuntu release and that Multipass
          receives the configured cloud-init file path.

      - id: DEV-006
        text: >-
          If the configured cloud-init file is missing, unreadable, or the VM
          launch fails, then the system shall display an error and abort the
          create command.
        ears_type: unwanted-behavior
        verification: >-
          Configure an invalid cloud-init path or otherwise cause launch to fail,
          run the create command, and confirm the command reports the failure
          instead of continuing.

  - id: US-003
    title: Preserve Secure Runtime Defaults
    narrative:
      as_a: developer
      i_want: the created environment to keep the same secure runtime posture
      so_that: the MVP remains simple without weakening the isolation model
    requirements:
      - id: DEV-007
        text: >-
          The system shall create the guest runtime as the non-root user defined
          by the checked-in cloud-init file.
        ears_type: ubiquitous
        verification: >-
          After the VM is created, enter it and run `whoami`. Confirm the
          active user matches the configured guest user and is not `root`.

      - id: DEV-008
        text: >-
          When guest setup completes, the system shall ensure the guest user
          cannot execute commands with administrative privileges.
        ears_type: event-driven
        verification: >-
          After the VM is created, enter it as the guest user and run
          `sudo -n true`. Confirm the command fails.

      - id: DEV-009
        text: >-
          The system shall configure the guest firewall to deny inbound and
          outbound traffic by default.
        ears_type: ubiquitous
        verification: >-
          After the VM is created, inspect the guest firewall configuration and
          confirm both inbound and outbound default policies are deny.

      - id: DEV-010
        text: >-
          The system shall allow outbound network connections only on the ports
          defined in the checked-in cloud-init file.
        ears_type: ubiquitous
        verification: >-
          Run the create command and confirm the guest firewall contains allow
          rules for only the outbound ports declared in the cloud-init file.

      - id: DEV-011
        text: >-
          The system shall allow only the guest SSH access required for
          Multipass-managed operations.
        ears_type: ubiquitous
        verification: >-
          Run the create command and confirm UFW permits inbound TCP port 22
          while the VM remains accessible via `multipass exec` and
          `multipass shell`.
