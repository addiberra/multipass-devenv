schema_version: "3.0.0"
feature: dev-env-setup
version: "3.0.0"
status: Implemented
source_design_version: "2.0.0"
source_spec_version: "2.0.0"
last_updated: "2026-03-28"
overview: >-
  Simplify network filtering by replacing domain-level iptables with UFW
  port-level rules. Three tasks: replace iptables with UFW in security.yaml,
  strip network complexity from launch.sh, and delete the whitelist config.
  TASK-001 and TASK-002 are independent roots. TASK-003 depends on TASK-002.

tasks:
  - id: TASK-001
    title: Replace iptables with UFW in security.yaml
    depends_on: []
    components: [cloud-init/security.yaml, cloud-init/base.yaml]
    stories: [US-004]
    requirements: [DEV-012, DEV-013, DEV-014, DEV-015]
    done: true
    description: >-
      Replace the iptables default-deny skeleton and placeholder in
      security.yaml with UFW runcmd entries: ufw default deny outgoing,
      ufw default deny incoming, ufw allow out 443/tcp, ufw allow out 22/tcp,
      ufw allow out 53, ufw --force enable. In base.yaml, replace
      iptables and iptables-persistent packages with ufw.

  - id: TASK-002
    title: Remove network complexity from launch.sh
    depends_on: []
    components: [scripts/launch.sh]
    stories: [US-001, US-004]
    requirements: [DEV-001, DEV-003, DEV-012]
    done: true
    description: >-
      Remove from launch.sh: --network flag and NETWORK_FILE variable,
      validate_network_file(), parse_dns_servers(), parse_egress_entries(),
      resolve_domain(), generate_network_rules(), and the placeholder
      injection logic in generate_cloud_init(). Remove all references to
      network whitelist from print_usage(). The generate_cloud_init()
      function should simply merge base.yaml and security.yaml runcmd
      without inserting dynamic rules.

  - id: TASK-003
    title: Delete network whitelist config
    depends_on: [TASK-002]
    components: [config/network-whitelist.default.yaml]
    stories: [US-004]
    requirements: [DEV-012]
    done: true
    description: >-
      Delete config/network-whitelist.default.yaml and the config/ directory
      (if empty after deletion). Remove DEFAULT_NETWORK variable from
      launch.sh.
