# yaml-language-server: $schema=../../../.agents/skills/needs-tasks/schemas/tasks.schema.json

schema_version: "3.0.0"
feature: dev-env-setup
version: "1.1.0"
status: Implemented
source_design_version: "1.1.0"
source_spec_version: "1.1.0"
last_updated: "2026-03-27"

overview: >-
  Simplified implementation plan for the Multipass dev environment. The feature
  now focuses on VM launch, secret injection, repo cloning, network controls,
  and supply-chain safeguards using VM isolation and user-managed lifecycle.

tasks:
  - id: TASK-001
    title: Create default network whitelist configuration
    depends_on: []
    components: [config/network-whitelist.default.yaml]
    stories: [US-004]
    requirements: [DEV-012, DEV-013, DEV-014, DEV-015]
    done: true
    description: >-
      Define the default egress allowlist for git providers, LLM APIs,
      package registries, and trusted DNS resolvers.

  - id: TASK-002
    title: Create OpenCode config template
    depends_on: []
    components: [templates/opencode-config.yaml.j2]
    stories: [US-002]
    requirements: [DEV-007]
    done: true
    description: >-
      Create the template used to render OpenCode configuration with injected
      secrets at VM launch time.

  - id: TASK-003
    title: Create base cloud-init configuration
    depends_on: [TASK-001]
    components: [cloud-init/base.yaml]
    stories: [US-001, US-005]
    requirements: [DEV-001, DEV-002, DEV-018]
    done: true
    description: >-
      Install base packages from official Ubuntu repositories, create the
      non-root opencode user, and prepare workspace and configuration directories.

  - id: TASK-004
    title: Create security cloud-init configuration
    depends_on: [TASK-001, TASK-002, TASK-003]
    components: [cloud-init/security.yaml]
    stories: [US-002, US-003, US-004, US-005]
    requirements: [DEV-005, DEV-006, DEV-007, DEV-008, DEV-010, DEV-011, DEV-012, DEV-017, DEV-019, DEV-020, DEV-021]
    done: true
    description: >-
      Configure outbound network restrictions, disable SSH access, lock the
      OpenCode config directory after setup, and install OpenCode with checksum
      verification.

  - id: TASK-005
    title: Create launch script
    depends_on: [TASK-003, TASK-004]
    components: [scripts/launch.sh]
    stories: [US-001, US-002, US-003, US-004]
    requirements: [DEV-001, DEV-003, DEV-004, DEV-009, DEV-016, DEV-017]
    done: true
    description: >-
      Create the script that validates inputs, renders cloud-init, launches the
      VM, and reports how to connect to the workspace.

  - id: TASK-006
    title: Create secrets injection helper script
    depends_on: [TASK-002]
    components: [scripts/inject-secrets.sh]
    stories: [US-002]
    requirements: [DEV-007, DEV-008]
    done: true
    description: >-
      Create the helper that transforms secrets.env content into cloud-init-safe
      configuration snippets.

  - id: TASK-007
    title: Create Python requirements template with hash verification
    depends_on: []
    components: [templates/requirements.pinned.txt.j2]
    stories: [US-005]
    requirements: [DEV-019]
    done: true
    description: >-
      Document and template a hash-verified Python requirements file for
      reproducible and auditable package installation.

  - id: TASK-008
    title: Integrate components and document usage
    depends_on: [TASK-005, TASK-006, TASK-007]
    components: [scripts/launch.sh, scripts/inject-secrets.sh, README.md]
    stories: [US-001, US-002, US-003, US-004, US-005]
    requirements: [DEV-001, DEV-002, DEV-003, DEV-004, DEV-005, DEV-006, DEV-007, DEV-008, DEV-009, DEV-010, DEV-011, DEV-012, DEV-013, DEV-014, DEV-015, DEV-016, DEV-017, DEV-018, DEV-019, DEV-020, DEV-021]
    done: true
    description: >-
      Verify the launch flow end to end and document the simplified workflow,
      including connection, network customization, and verification steps.
