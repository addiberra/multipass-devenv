# yaml-language-server: $schema=../../../.agents/skills/needs-tasks/schemas/tasks.schema.json

schema_version: "3.0.0"
feature: dev-env-setup
version: "5.0.0"
status: Implemented
source_design_version: "4.0.0"
source_spec_version: "4.0.0"
last_updated: "2026-04-01"

overview: >-
  Simplify the repository to an MVP with one checked-in cloud-init file, one
  minimal `devvm.yaml` machine config, and one thin Go `create` command. The
  work is organized into config simplification, launch-path simplification,
  repository cleanup, and final validation.

tasks:
  - id: TASK-001
    title: Simplify the machine config contract
    depends_on: []
    components: [devvm.yaml, schemas/devvm.schema.json, internal/config]
    stories: [US-001]
    requirements: [DEV-001, DEV-002, DEV-003, DEV-004]
    done: true
    description: >-
      Reduce `devvm.yaml` and the Go config loader to the MVP machine fields
      only. Validate instance sizing, release, and cloud-init path, and derive
      a fallback instance name from the working directory when needed.

  - id: TASK-002
    title: Simplify the Multipass create flow
    depends_on: [TASK-001]
    components: [cmd/devvm, internal/create, internal/multipass]
    stories: [US-001, US-002]
    requirements: [DEV-001, DEV-005, DEV-006]
    done: true
    description: >-
      Reduce the CLI and Multipass wrapper to a single launch path that uses
      the configured cloud-init file and waits for cloud-init completion before
      reporting success.

  - id: TASK-003
    title: Align the checked-in cloud-init and repository layout to the MVP
    depends_on: [TASK-002]
    components: [opencode-sandbox.yaml, README.md]
    stories: [US-002, US-003]
    requirements: [DEV-005, DEV-007, DEV-008, DEV-009, DEV-010, DEV-011]
    done: true
    description: >-
      Keep one checked-in cloud-init file as the guest provisioning contract,
      remove obsolete provisioning helpers and extra templates, and update the
      repository documentation and structure to match the MVP.

  - id: TASK-004
    title: Validate the MVP launch workflow
    depends_on: [TASK-003]
    components: [cmd/devvm, internal/config, internal/create, internal/multipass, docs/features/dev-env-setup]
    stories: [US-001, US-002, US-003]
    requirements: [DEV-002, DEV-003, DEV-004, DEV-006, DEV-007, DEV-008, DEV-009, DEV-010, DEV-011]
    done: true
    description: >-
      Run task and spec validators plus code-level verification for the reduced
      CLI. Confirm the documented workflow matches the implemented MVP behavior.
