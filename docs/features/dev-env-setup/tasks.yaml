# yaml-language-server: $schema=../../../.agents/skills/needs-tasks/schemas/tasks.schema.json

schema_version: "3.0.0"
feature: dev-env-setup
version: "6.0.0"
status: Implemented
source_design_version: "5.0.0"
source_spec_version: "5.0.0"
last_updated: "2026-04-02"

overview: >-
  Extend the MVP launch flow with one optional repo-scoped host mount. The work
  is organized into config and schema updates, create-flow and Multipass mount
  support, documentation updates, and final validation.

tasks:
  - id: TASK-001
    title: Extend the machine config contract for an optional mount
    depends_on: []
    components: [devvm.yaml, schemas/devvm.schema.json, internal/config]
    stories: [US-001, US-004]
    requirements: [DEV-001, DEV-002, DEV-003, DEV-004, DEV-012]
    done: true
    description: >-
      Extend `devvm.yaml`, its schema, and the Go config loader with one
      optional mount definition. Validate the host path, guest path, and
      privileged flag while preserving the existing launch validation and
      fallback instance-name behavior.

  - id: TASK-002
    title: Add privileged mount and repo mount steps to the create flow
    depends_on: [TASK-001]
    components: [cmd/devvm, internal/create, internal/multipass]
    stories: [US-001, US-002, US-004]
    requirements: [DEV-001, DEV-005, DEV-006, DEV-013, DEV-014]
    done: true
    description: >-
      Keep the existing launch path, then, when a mount is configured, set
      `local.privileged-mounts`, run `multipass mount`, and surface failures as
      create errors instead of success.

  - id: TASK-003
    title: Update documentation for the optional mount workflow
    depends_on: [TASK-002]
    components: [README.md, docs/features/dev-env-setup, docs/architecture.adoc]
    stories: [US-002, US-003, US-004]
    requirements: [DEV-005, DEV-007, DEV-008, DEV-009, DEV-010, DEV-011, DEV-012, DEV-013, DEV-014]
    done: true
    description: >-
      Update the feature docs, architecture document, and README so they
      describe the optional repo mount workflow and its scoped security model.

  - id: TASK-004
    title: Validate the mounted launch workflow
    depends_on: [TASK-003]
    components: [cmd/devvm, internal/config, internal/create, internal/multipass, docs/features/dev-env-setup]
    stories: [US-001, US-002, US-003, US-004]
    requirements: [DEV-002, DEV-003, DEV-004, DEV-006, DEV-007, DEV-008, DEV-009, DEV-010, DEV-011, DEV-012, DEV-013, DEV-014]
    done: true
    description: >-
      Run task and spec validators plus Go tests and build verification for the
      updated CLI. Confirm the documented workflow matches the implemented mount
      behavior.
