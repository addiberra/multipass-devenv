# yaml-language-server: $schema=./schemas/devvm.schema.json

schema_version: "1.0"
cloud_init: "./opencode-sandbox.yaml"

mount:
  host_path: "~/projects/my-repo"
  guest_path: "/home/agent/workspace/my-repo"
  privileged: true

instance:
  name: "my-project-devvm"
  ubuntu_release: "24.04"
  cpus: 2
  memory: "4G"
  disk: "30G"
