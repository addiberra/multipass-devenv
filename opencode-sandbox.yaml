#cloud-config

# =============================================================================
# OpenCode Agent Sandbox — Multipass Cloud-Init
# Sandboxed VM for running OpenCode as a coding agent with network isolation.
#
# SECURITY: Installs a pinned OpenCode release binary with SHA-256 verification
# instead of piping a remote script into bash.
#
# BEFORE FIRST USE — you must fill in the SHA-256 hash:
#   1. Download the binary on a trusted machine:
#      wget https://github.com/anomalyco/opencode/releases/download/v1.3.10/opencode-linux-amd64
#   2. Compute the checksum:
#      sha256sum opencode-linux-amd64
#   3. Replace REPLACE_WITH_ACTUAL_SHA256 below with the hash output.
#
# To update OpenCode, change OPENCODE_VERSION and OPENCODE_SHA256 together.
# =============================================================================

users:
  - default
  - name: agent
    gecos: OpenCode Agent User
    shell: /bin/bash
    sudo: false
    lock_passwd: true
    no_log_init: true

package_update: true
package_upgrade: true

packages:
  - ufw
  - curl
  - git
  - jq
  - build-essential
  - ripgrep
  - fd-find

write_files:
  # --- Pinned version + checksum (edit these two values to upgrade) ---
  - path: /etc/opencode-sandbox/version.env
    owner: root:root
    permissions: "0644"
    content: |
      OPENCODE_VERSION=1.3.10
      OPENCODE_SHA256=REPLACE_WITH_ACTUAL_SHA256

  # --- Install script: download, verify, place binary ---
  - path: /usr/local/sbin/install-opencode.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      source /etc/opencode-sandbox/version.env

      DOWNLOAD_URL="https://github.com/anomalyco/opencode/releases/download/v${OPENCODE_VERSION}/opencode-linux-amd64"
      DEST="/usr/local/bin/opencode"
      TMPFILE=$(mktemp /tmp/opencode-XXXXXX)

      echo "Downloading OpenCode v${OPENCODE_VERSION}..."
      curl -fSL --retry 3 --retry-delay 5 -o "${TMPFILE}" "${DOWNLOAD_URL}"

      echo "Verifying SHA-256 checksum..."
      ACTUAL_SHA256=$(sha256sum "${TMPFILE}" | awk '{print $1}')

      if [ "${ACTUAL_SHA256}" != "${OPENCODE_SHA256}" ]; then
        echo "CHECKSUM MISMATCH!" >&2
        echo "  Expected: ${OPENCODE_SHA256}" >&2
        echo "  Got:      ${ACTUAL_SHA256}" >&2
        rm -f "${TMPFILE}"
        exit 1
      fi

      echo "Checksum verified."
      chmod 755 "${TMPFILE}"
      mv "${TMPFILE}" "${DEST}"
      echo "OpenCode v${OPENCODE_VERSION} installed to ${DEST}"

  # --- Agent .bashrc: locked-down environment ---
  - path: /home/agent/.bashrc
    owner: agent:agent
    permissions: "0644"
    defer: true
    content: |
      export HISTFILE=/dev/null
      export HISTSIZE=0
      export PATH=/usr/local/bin:/usr/bin:/bin:/home/agent/.local/bin
      export WORKSPACE=/home/agent/workspace
      export XDG_CONFIG_HOME=/home/agent/.config
      cd "$WORKSPACE" 2>/dev/null || true

  # --- Restricted DNS to prevent DNS-based exfiltration ---
  - path: /etc/systemd/resolved.conf.d/restricted-dns.conf
    owner: root:root
    permissions: "0644"
    content: |
      [Resolve]
      DNS=1.1.1.1 1.0.0.1
      DNSOverTLS=yes
      Domains=~.

  # --- MOTD reminder that this is ephemeral ---
  - path: /etc/motd
    owner: root:root
    permissions: "0644"
    content: |
      *** EPHEMERAL OPENCODE AGENT SANDBOX ***
      Agent user: agent  |  Workspace: /home/agent/workspace
      Destroy after use:  multipass delete <n> --purge

  # --- OpenCode config placeholder (agent user) ---
  - path: /home/agent/.config/opencode/opencode.json
    owner: agent:agent
    permissions: "0644"
    defer: true
    content: |
      {
        "$schema": "https://opencode.ai/config.json",
        "agents": {
          "coder": {
            "reasoningEffort": "high"
          }
        }
      }

runcmd:
  # ── Install OpenCode (pinned binary with checksum) ──
  - mkdir -p /etc/opencode-sandbox
  - /usr/local/sbin/install-opencode.sh

  # ── Create agent workspace ──
  - mkdir -p /home/agent/workspace
  - mkdir -p /home/agent/.config/opencode
  - mkdir -p /home/agent/.local/bin
  - chown -R agent:agent /home/agent/workspace
  - chown -R agent:agent /home/agent/.config
  - chown -R agent:agent /home/agent/.local

  # ── Lock agent home directory ──
  - chown root:agent /home/agent
  - chmod 750 /home/agent
  - chattr +i /home/agent/.bashrc
  - chattr +i /home/agent/.profile 2>/dev/null || true
  - chattr +i /home/agent/.bash_logout 2>/dev/null || true

  # ── Egress firewall: deny-by-default ──
  - ufw default deny outgoing
  - ufw default deny incoming

  # DNS — only to Cloudflare resolvers
  - ufw allow out to 1.1.1.1 port 53 proto udp
  - ufw allow out to 1.0.0.1 port 53 proto udp

  # HTTPS — required for LLM API calls
  - ufw allow out to any port 443 proto tcp

  # HTTP — needed for some package repos
  - ufw allow out to any port 80 proto tcp

  # Loopback — required for local dev servers / LSP
  - ufw allow out on lo
  - ufw allow in on lo

  - ufw --force enable

  # ── Restart resolved with restricted DNS ──
  - systemctl restart systemd-resolved

  # ── Log completion ──
  - echo "OpenCode sandbox provisioned at $(date)" >> /var/log/cloud-init-output.log
