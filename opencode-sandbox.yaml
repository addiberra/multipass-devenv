#cloud-config

# =============================================================================
# OpenCode Agent Sandbox — Multipass Cloud-Init
# Sandboxed VM for running OpenCode as a coding agent with network isolation.
#
# SECURITY: Installs a pinned OpenCode CLI npm package version from the official
# npm registry using Ubuntu's nodejs and npm packages.
#
# To update OpenCode, change OPENCODE_VERSION below.
# =============================================================================

users:
  - default
  - name: agent
    gecos: OpenCode Agent User
    shell: /bin/bash
    sudo: false
    lock_passwd: true
    no_log_init: true

package_update: true
package_upgrade: true

packages:
  - ufw
  - curl
  - git
  - jq
  - nodejs
  - npm
  - build-essential
  - ripgrep
  - fd-find

write_files:
  # --- Pinned package version (edit this value to upgrade) ---
  - path: /etc/opencode-sandbox/version.env
    owner: root:root
    permissions: "0644"
    content: |
      OPENCODE_VERSION=1.3.10

  # --- Install script: pinned npm package install ---
  - path: /usr/local/sbin/install-opencode.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      source /etc/opencode-sandbox/version.env

      export npm_config_update_notifier=false
      export npm_config_fund=false
      export npm_config_audit=false

      echo "Installing OpenCode CLI v${OPENCODE_VERSION} from npm..."
      npm install --global "opencode-ai@${OPENCODE_VERSION}"

      if ! command -v opencode >/dev/null 2>&1; then
        echo "OpenCode CLI was not added to PATH" >&2
        exit 1
      fi

      echo "OpenCode CLI v${OPENCODE_VERSION} installed at $(command -v opencode)"

  # --- Agent .bashrc: locked-down environment ---
  - path: /home/agent/.bashrc
    owner: agent:agent
    permissions: "0644"
    defer: true
    content: |
      export HISTFILE=/dev/null
      export HISTSIZE=0
      export PATH=/usr/local/bin:/usr/bin:/bin:/home/agent/.local/bin
      export WORKSPACE=/home/agent/workspace
      export XDG_CONFIG_HOME=/home/agent/.config
      export XDG_CACHE_HOME=/home/agent/.cache
      export npm_config_cache=/home/agent/.npm
      cd "$WORKSPACE" 2>/dev/null || true

  # --- Restricted DNS to prevent DNS-based exfiltration ---
  - path: /etc/systemd/resolved.conf.d/restricted-dns.conf
    owner: root:root
    permissions: "0644"
    content: |
      [Resolve]
      DNS=1.1.1.1 1.0.0.1
      DNSOverTLS=yes
      Domains=~.

  # --- MOTD reminder that this is ephemeral ---
  - path: /etc/motd
    owner: root:root
    permissions: "0644"
    content: |
      *** EPHEMERAL OPENCODE AGENT SANDBOX ***
      Agent user: agent  |  Workspace: /home/agent/workspace
      Destroy after use:  multipass delete <n> --purge

  # --- OpenCode config placeholder (agent user) ---
  - path: /home/agent/.config/opencode/opencode.json
    owner: agent:agent
    permissions: "0644"
    defer: true
    content: |
      {
        "$schema": "https://opencode.ai/config.json",
        "agents": {
          "coder": {
            "reasoningEffort": "high"
          }
        }
      }

runcmd:
  # ── Install OpenCode CLI from npm ──
  - mkdir -p /etc/opencode-sandbox
  - /usr/local/sbin/install-opencode.sh

  # ── Create agent workspace ──
  - mkdir -p /home/agent/workspace
  - mkdir -p /home/agent/.config/opencode
  - mkdir -p /home/agent/.cache
  - mkdir -p /home/agent/.npm
  - mkdir -p /home/agent/.local/bin
  - chown -R agent:agent /home/agent/workspace
  - chown -R agent:agent /home/agent/.config
  - chown -R agent:agent /home/agent/.cache
  - chown -R agent:agent /home/agent/.npm
  - chown -R agent:agent /home/agent/.local

  # ── Lock agent home directory ──
  - chown root:agent /home/agent
  - chmod 750 /home/agent
  - chattr +i /home/agent/.bashrc
  - chattr +i /home/agent/.profile 2>/dev/null || true
  - chattr +i /home/agent/.bash_logout 2>/dev/null || true

  # ── Egress firewall: deny-by-default ──
  - ufw default deny outgoing
  - ufw default deny incoming

  # Multipass uses guest SSH for exec/shell/readiness operations
  - ufw allow in 22/tcp

  # DNS — only to Cloudflare resolvers
  - ufw allow out to 1.1.1.1 port 53 proto udp
  - ufw allow out to 1.0.0.1 port 53 proto udp
  - ufw allow out to 1.1.1.1 port 853 proto tcp
  - ufw allow out to 1.0.0.1 port 853 proto tcp

  # Block access to RFC1918 networks even on otherwise allowed ports
  - ufw deny out to 10.0.0.0/8
  - ufw deny out to 172.16.0.0/12
  - ufw deny out to 192.168.0.0/16

  # HTTPS — required for LLM API calls
  - ufw allow out to any port 443 proto tcp

  # HTTP — needed for some package repos
  - ufw allow out to any port 80 proto tcp

  # Loopback — required for local dev servers / LSP
  - ufw allow out on lo
  - ufw allow in on lo

  - ufw --force enable

  # ── Restart resolved with restricted DNS ──
  - systemctl restart systemd-resolved

  # ── Log completion ──
  - echo "OpenCode sandbox provisioned at $(date)" >> /var/log/cloud-init-output.log
