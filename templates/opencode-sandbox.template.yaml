#cloud-config

# =============================================================================
# OpenCode Agent Sandbox — Multipass Template
# Starter cloud-init for OpenCode-based Multipass agent workflows.
# Copy this file into your own repo and adjust the package list, WORKSPACE,
# firewall policy, and OpenCode config to match your workflow.
#
# SECURITY: Uses apt for Ubuntu bootstrap packages and a pinned Homebrew
# installer plus pinned homebrew/core snapshot for userland tools.
# =============================================================================

users:
  - default
  - name: agent
    gecos: OpenCode Agent User
    shell: /bin/bash
    sudo: false
    lock_passwd: true
    no_log_init: true

package_update: true
package_upgrade: true

packages:
  - ufw
  - curl
  - git
  - jq
  - build-essential
  - procps
  - file
  - fd-find

write_files:
  - path: /etc/opencode-sandbox/version.env
    owner: root:root
    permissions: "0644"
    content: |
      HOMEBREW_INSTALL_COMMIT=6d5e2670d07961e7985d2079a2f0a484420f3c38
      HOMEBREW_INSTALL_SHA256=dfd5145fe2aa5956a600e35848765273f5798ce6def01bd08ecec088a1268d91
      HOMEBREW_CORE_COMMIT=3fab2da1d77b304ea2c3907c9e28fd4c276215e6
      HOMEBREW_PACKAGES="opencode"
      OPENCODE_VERSION=1.3.10

  - path: /usr/local/sbin/install-homebrew.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      source /etc/opencode-sandbox/version.env

      install_dir=/run/opencode-sandbox
      installer_path="${install_dir}/install-homebrew.sh"
      install_url="https://raw.githubusercontent.com/Homebrew/install/${HOMEBREW_INSTALL_COMMIT}/install.sh"

      mkdir -p "${install_dir}"
      curl -fsSL "${install_url}" -o "${installer_path}"
      echo "${HOMEBREW_INSTALL_SHA256}  ${installer_path}" | sha256sum --check --status
      chmod 0755 "${installer_path}"

      sudo -u ubuntu -H env NONINTERACTIVE=1 HOMEBREW_NO_INSTALL_FROM_API=1 /bin/bash "${installer_path}"

      core_repo="$(sudo -u ubuntu -H /home/linuxbrew/.linuxbrew/bin/brew --repo homebrew/core)"
      sudo -u ubuntu -H git -C "${core_repo}" checkout --quiet --detach "${HOMEBREW_CORE_COMMIT}"

  - path: /usr/local/sbin/install-tooling.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      source /etc/opencode-sandbox/version.env

      brew_bin=/home/linuxbrew/.linuxbrew/bin/brew
      core_repo="$(sudo -u ubuntu -H env HOMEBREW_NO_AUTO_UPDATE=1 "${brew_bin}" --repo homebrew/core)"
      actual_core_commit="$(sudo -u ubuntu -H git -C "${core_repo}" rev-parse HEAD)"

      if [[ "${actual_core_commit}" != "${HOMEBREW_CORE_COMMIT}" ]]; then
        echo "homebrew/core commit mismatch: ${actual_core_commit}" >&2
        exit 1
      fi

      sudo -u ubuntu -H env HOMEBREW_NO_AUTO_UPDATE=1 "${brew_bin}" install ${HOMEBREW_PACKAGES}
      sudo -u ubuntu -H env HOMEBREW_NO_AUTO_UPDATE=1 "${brew_bin}" pin ${HOMEBREW_PACKAGES}

      set -- $(sudo -u ubuntu -H env HOMEBREW_NO_AUTO_UPDATE=1 "${brew_bin}" list --versions opencode)
      actual_opencode_version="${2:-}"
      if [[ "${actual_opencode_version}" != "${OPENCODE_VERSION}" ]]; then
        echo "Unexpected OpenCode version: ${actual_opencode_version}" >&2
        exit 1
      fi

      sudo -u ubuntu -H env PATH=/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/bin:/bin opencode --version

  - path: /etc/profile.d/homebrew.sh
    owner: root:root
    permissions: "0644"
    content: |
      export HOMEBREW_NO_AUTO_UPDATE=1
      if [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      fi

  - path: /usr/local/sbin/verify-tooling.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      source /etc/opencode-sandbox/version.env

      brew_bin=/home/linuxbrew/.linuxbrew/bin/brew
      installed_packages="$(sudo -u ubuntu -H env HOMEBREW_NO_AUTO_UPDATE=1 "${brew_bin}" list --formula)"

      if ! grep -qx opencode <<<"${installed_packages}"; then
        echo "Missing package: opencode" >&2
        exit 1
      fi

      if ! sudo -u ubuntu -H env HOMEBREW_NO_AUTO_UPDATE=1 "${brew_bin}" doctor; then
        echo "brew doctor reported an issue" >&2
        exit 1
      fi

  - path: /home/agent/.bashrc
    owner: agent:agent
    permissions: "0644"
    defer: true
    content: |
      export HISTFILE=/dev/null
      export HISTSIZE=0
      export PATH=/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/bin:/usr/bin:/bin:/home/agent/.local/bin
      export WORKSPACE=/home/agent/workspace
      export XDG_CONFIG_HOME=/home/agent/.config
      export XDG_CACHE_HOME=/home/agent/.cache
      cd "$WORKSPACE" 2>/dev/null || true

  - path: /etc/systemd/resolved.conf.d/restricted-dns.conf
    owner: root:root
    permissions: "0644"
    content: |
      [Resolve]
      DNS=1.1.1.1 1.0.0.1
      DNSOverTLS=yes
      Domains=~.

  - path: /etc/motd
    owner: root:root
    permissions: "0644"
    content: |
      *** EPHEMERAL OPENCODE AGENT SANDBOX ***
      User: agent  |  Workspace: /home/agent/workspace
      Destroy after use:  multipass delete <n> --purge

  - path: /home/agent/.config/opencode/opencode.json
    owner: agent:agent
    permissions: "0644"
    defer: true
    content: |
      {
        "$schema": "https://opencode.ai/config.json",
        "share": "disabled"
      }

runcmd:
  - mkdir -p /etc/opencode-sandbox
  - /usr/local/sbin/install-homebrew.sh
  - /usr/local/sbin/install-tooling.sh
  - /usr/local/sbin/verify-tooling.sh
  - mkdir -p /home/agent/workspace
  - mkdir -p /home/agent/.config/opencode
  - mkdir -p /home/agent/.cache
  - mkdir -p /home/agent/.local/bin
  - chown -R agent:agent /home/agent/workspace
  - chown -R agent:agent /home/agent/.config
  - chown -R agent:agent /home/agent/.cache
  - chown -R agent:agent /home/agent/.local
  - chown root:agent /home/agent
  - chmod 750 /home/agent
  - chattr +i /home/agent/.bashrc
  - chattr +i /home/agent/.profile 2>/dev/null || true
  - chattr +i /home/agent/.bash_logout 2>/dev/null || true
  - ufw default deny outgoing
  - ufw default deny incoming
  - ufw allow in 22/tcp
  - ufw allow out to 1.1.1.1 port 53 proto udp
  - ufw allow out to 1.0.0.1 port 53 proto udp
  - ufw allow out to 1.1.1.1 port 853 proto tcp
  - ufw allow out to 1.0.0.1 port 853 proto tcp
  - ufw deny out to 10.0.0.0/8
  - ufw deny out to 172.16.0.0/12
  - ufw deny out to 192.168.0.0/16
  - ufw allow out to any port 443 proto tcp
  - ufw allow out to any port 80 proto tcp
  - ufw allow out on lo
  - ufw allow in on lo
  - ufw --force enable
  - systemctl restart systemd-resolved
  - echo "Template sandbox provisioned at $(date)" >> /var/log/cloud-init-output.log
